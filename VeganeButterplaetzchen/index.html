	<h1>Zutaten</h1>
	<ul>
	<h3>
		<li><p>300g Mehl</p></li>
		<li><p>200g Margerine</p></li>
		<li><p>100g Zucker</p></li>
		<li><p>Vanillezucker</p></li>
		<li><p>1 Prise Salz</p></li>
	</h3>
	</ul>
	
	<h1>Zubereitung</h1>
	<h4>
		<p>1 Stunde im Kühlschrank ruhen lassen</p> 
		<p>Ausstechen und 10 min bei 180°C backen</p>
